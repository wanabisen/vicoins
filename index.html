<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vic Coins</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4F8;min-height:100vh}
.app{max-width:430px;margin:0 auto;padding:12px}
.topbar{background:#185FA5;border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{color:#fff;font-size:17px;font-weight:600}
.topbar-date{color:#B5D4F4;font-size:12px;margin-top:2px}
.topbar-right{text-align:right;color:#B5D4F4;font-size:11px;line-height:1.6}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4CAF50;margin-right:4px;vertical-align:middle}
.sync-dot.off{background:#E24B4A}
.user-switch{display:flex;gap:6px;margin-bottom:10px}
.user-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid #D0D9E8;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#5A7A9A;transition:all .15s}
.user-btn.active{border-color:#185FA5;background:#E6F1FB;color:#0C447C}
.tablet-banner{background:#EAF3DE;border:1px solid #97C459;border-radius:10px;padding:9px 13px;font-size:13px;color:#27500A;margin-bottom:10px;display:none}
.tablet-banner.show{display:block}
.pts-banner{background:#E6F1FB;border-radius:14px;padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.pts-num{font-size:36px;font-weight:700;color:#185FA5;line-height:1}
.pts-label{font-size:13px;color:#0C447C;margin-top:2px}
.pts-right{text-align:right}
.pts-max{font-size:12px;color:#185FA5}
.pts-hucha{font-size:11px;color:#378ADD;margin-top:3px}
.prog-card{background:#fff;border-radius:14px;border:1px solid #E0E8F0;padding:12px 16px;margin-bottom:10px}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:#6B8299;margin-bottom:6px}
.prog-bar{height:9px;background:#EAF1F8;border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:#185FA5;border-radius:5px;transition:width .5s}
.prog-goal-text{font-size:11px;color:#378ADD;margin-top:5px}
.goal-form{display:flex;gap:6px;margin-top:9px}
.goal-form input{flex:1;font-size:12px;padding:5px 9px;border-radius:8px;border:1px solid #D0D9E8;outline:none;background:#F7FAFD;color:#1a1a1a}
.goal-form button{font-size:12px;padding:5px 11px;border-radius:8px;border:1px solid #185FA5;background:#185FA5;color:#fff;cursor:pointer}
.block-label{font-size:11px;font-weight:600;color:#8A9BB0;letter-spacing:.07em;text-transform:uppercase;margin:13px 0 6px 2px}
.task-card{background:#fff;border:1px solid #E8EEF5;border-radius:14px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.task-card:active{transform:scale(0.98);background:#F7FAFD}
.task-card.done{opacity:.55}
.task-card.done .task-name{text-decoration:line-through;color:#8A9BB0}
.check-circle{width:30px;height:30px;border-radius:50%;border:2px solid #C8D8E8;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:#fff}
.check-circle.checked{background:#185FA5;border-color:#185FA5}
.check-circle svg{display:none}
.check-circle.checked svg{display:block}
.task-info{flex:1;min-width:0}
.task-name{font-size:14px;color:#1A2B3C;font-weight:500}
.task-sub{font-size:11px;color:#8A9BB0;margin-top:2px}
.task-pts-col{text-align:right;flex-shrink:0}
.task-pts-base{font-size:15px;font-weight:600;color:#185FA5}
.task-pts-bonus{font-size:11px;color:#854F0B}
.task-card.done .task-pts-base{color:#A0B0C0}
.bonus-modal{background:#FFFBF0;border:1px solid #F0C060;border-radius:12px;padding:13px 15px;margin-bottom:6px}
.bonus-q{font-size:13px;color:#3A2A00;margin-bottom:10px;line-height:1.4}
.bonus-btns{display:flex;gap:8px}
.bonus-btn{flex:1;padding:9px;border-radius:9px;border:1px solid #D0C090;background:#FFF8E0;cursor:pointer;font-size:13px;color:#3A2A00;transition:all .15s}
.bonus-btn.yes{border-color:#185FA5;background:#E6F1FB;color:#0C447C;font-weight:500}
.log-section{margin-top:12px}
.log-entry{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #EEF2F7;font-size:13px}
.log-dot{width:8px;height:8px;border-radius:50%;background:#185FA5;flex-shrink:0}
.log-dot.neg{background:#E24B4A}
.log-text{flex:1;color:#1A2B3C}
.log-who{font-size:11px;color:#8A9BB0;white-space:nowrap}
.log-pts{font-size:13px;font-weight:600;color:#185FA5;white-space:nowrap}
.log-pts.neg{color:#E24B4A}
.bottom-btns{display:flex;gap:8px;margin-top:14px;margin-bottom:20px}
.bottom-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #D0D9E8;background:#fff;cursor:pointer;font-size:13px;color:#5A7A9A;font-weight:500}
.bottom-btn:active{background:#EAF1F8}
.loading{text-align:center;padding:40px 20px;color:#8A9BB0;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">⭐ Vic Coins</div>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
    <div class="topbar-right">
      <span class="sync-dot" id="sync-dot"></span><span id="sync-label">Conectando...</span><br>
      200 VC = 1€
    </div>
  </div>

  <div class="user-switch">
    <button class="user-btn active" id="btn-mama" onclick="switchUser('Mamá')">Mamá</button>
    <button class="user-btn" id="btn-papa" onclick="switchUser('Papá')">Papá</button>
  </div>

  <div class="tablet-banner" id="tablet-banner">✅ Deberes completados — la tablet está desbloqueada</div>

  <div class="pts-banner">
    <div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <span class="pts-num" id="pts-total">0</span>
        <span class="pts-label">Vic Coins hoy</span>
      </div>
    </div>
    <div class="pts-right">
      <div class="pts-max" id="pts-max">0 / 150 máx</div>
      <div class="pts-hucha" id="pts-hucha">Hucha: 0 VC</div>
    </div>
  </div>

  <div class="prog-card">
    <div class="prog-labels">
      <span>Progreso hacia el objetivo</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-goal-text" id="prog-text">Configura tu objetivo abajo</div>
    <div class="goal-form">
      <input id="goal-name" placeholder="Nombre del objetivo">
      <input id="goal-vc" type="number" placeholder="VC necesarias" style="max-width:120px">
      <button onclick="saveGoal()">OK</button>
    </div>
  </div>

  <div id="main-content"><div class="loading">Cargando...</div></div>

  <div class="log-section">
    <div class="block-label">Registro de hoy</div>
    <div id="log-list"><div style="font-size:13px;color:#8A9BB0;padding:8px 0">Sin actividad todavía</div></div>
  </div>

  <div class="bottom-btns">
    <button class="bottom-btn" onclick="resetDay()">🔄 Nuevo día</button>
    <button class="bottom-btn" onclick="showStats()">📊 Ver semana</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAMxJ0zYm_CvuvitP04xVCV9pfabg1FAC0",
  authDomain: "vic-coins.firebaseapp.com",
  projectId: "vic-coins",
  storageBucket: "vic-coins.firebasestorage.app",
  messagingSenderId: "281981848455",
  appId: "1:281981848455:web:0eb88f7017cbf7bcba2122"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const TASKS_MANANA = [
  {id:'des', name:'Desayunar solo', sub:'Sin que mamá esté en la cocina', pts:10, bonus:5, bonusLabel:'En menos de 15 min'},
  {id:'duc', name:'Ducharse solo', sub:'Con temporizador puesto', pts:15, bonus:5, bonusLabel:'En menos de 10 min'},
  {id:'ves', name:'Vestirse solo', sub:'Ropa preparada la noche anterior', pts:10, bonus:5, bonusLabel:'En menos de 5 min'},
  {id:'die', name:'Dientes + manos', sub:'Solo, sin recordatorio', pts:10, bonus:0, bonusLabel:''},
  {id:'moc', name:'Mochila + almuerzo', sub:'Revisado y cerrado solo', pts:10, bonus:0, bonusLabel:''},
  {id:'lis', name:'Listo a las 8:45', sub:'Chaqueta, mochila, zapatos', pts:0, bonus:10, bonusLabel:'Sin que nadie lo llame'},
];
const TASKS_TARDE = [
  {id:'cha', name:'Guardar chaqueta', sub:'Nada más llegar a casa', pts:5, bonus:0, bonusLabel:''},
  {id:'deb', name:'Deberes', sub:'Solo o con acompañamiento mínimo', pts:15, bonus:5, bonusLabel:'Sin recordatorio', tabletUnlock:true},
  {id:'mcs', name:'Mochila día siguiente', sub:'Preparada y revisada solo', pts:10, bonus:0, bonusLabel:''},
  {id:'ins', name:'Instrumento 10 min', sub:'Con temporizador puesto', pts:15, bonus:5, bonusLabel:'Más de 15 min voluntario'},
  {id:'pij', name:'Pijama + dientes', sub:'Solo, sin recordatorio', pts:10, bonus:5, bonusLabel:'Antes de las 21:00'},
];
const ALL_TASKS = [...TASKS_MANANA, ...TASKS_TARDE];

const TODAY = new Date().toISOString().slice(0,10);
const dayRef = doc(db, 'rutina', TODAY);
const configRef = doc(db, 'config', 'global');

let state = {done:{}, bonusDone:{}, log:[], huchaTotal:0, goal:{name:'', vc:0}};
let currentUser = localStorage.getItem('viccoins_user') || 'Mamá';

function setSync(ok) {
  document.getElementById('sync-dot').className = 'sync-dot' + (ok ? '' : ' off');
  document.getElementById('sync-label').textContent = ok ? 'Sincronizado' : 'Sin conexión';
}

async function saveDay() {
  try {
    await setDoc(dayRef, {done: state.done, bonusDone: state.bonusDone, log: state.log}, {merge:true});
    setSync(true);
  } catch(e) { setSync(false); }
}

async function saveConfig() {
  try {
    await setDoc(configRef, {huchaTotal: state.huchaTotal, goal: state.goal}, {merge:true});
  } catch(e) {}
}

function calcTotal() {
  let t = 0;
  ALL_TASKS.forEach(task => {
    if (state.done[task.id]) t += task.pts;
    if (state.bonusDone[task.id]) t += task.bonus;
  });
  return t;
}

function render() {
  const total = calcTotal();
  document.getElementById('pts-total').textContent = total;
  document.getElementById('pts-max').textContent = total + ' / 150 máx';
  const huchaDisplay = Math.round(state.huchaTotal + total);
  document.getElementById('pts-hucha').textContent = 'Hucha: ' + huchaDisplay + ' VC (' + (huchaDisplay/200).toFixed(1) + '€)';

  const g = state.goal;
  if (g.vc > 0) {
    const pct = Math.min(100, Math.round(huchaDisplay / g.vc * 100));
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('prog-text').textContent = g.name + ': ' + huchaDisplay + ' / ' + g.vc + ' VC';
    document.getElementById('goal-name').value = g.name;
    document.getElementById('goal-vc').value = g.vc;
  }

  document.getElementById('tablet-banner').className = 'tablet-banner' + (state.done['deb'] ? ' show' : '');

  renderTasks();
  renderLog();
}

function renderTasks() {
  const html = `
    <div class="block-label">🌅 Bloque mañana</div>
    ${TASKS_MANANA.map(t => taskHTML(t)).join('')}
    <div class="block-label">🌇 Bloque tarde</div>
    ${TASKS_TARDE.map(t => taskHTML(t)).join('')}
  `;
  document.getElementById('main-content').innerHTML = html;
  ALL_TASKS.forEach(task => {
    const el = document.getElementById('task-'+task.id);
    if (el) el.onclick = () => toggleTask(task);
    if (task.bonus > 0) {
      const yesBtn = document.getElementById('bonus-yes-'+task.id);
      const noBtn = document.getElementById('bonus-no-'+task.id);
      if (yesBtn) yesBtn.onclick = () => grantBonus(task.id, task.bonus, task.name);
      if (noBtn) noBtn.onclick = () => denyBonus(task.id);
    }
  });
}

function taskHTML(task) {
  const done = !!state.done[task.id];
  const bonusDone = state.bonusDone[task.id];
  const showBonus = done && task.bonus > 0 && !bonusDone;
  const earnedPts = (done ? task.pts : 0) + (bonusDone === true ? task.bonus : 0);
  return `
    <div class="task-card ${done?'done':''}" id="task-${task.id}">
      <div class="check-circle ${done?'checked':''}">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="task-info">
        <div class="task-name">${task.name}</div>
        <div class="task-sub">${task.sub}</div>
      </div>
      <div class="task-pts-col">
        <div class="task-pts-base">${done ? earnedPts : task.pts} VC</div>
        ${task.bonus > 0 ? `<div class="task-pts-bonus">+${task.bonus} bonus</div>` : ''}
      </div>
    </div>
    ${showBonus ? `
    <div class="bonus-modal">
      <div class="bonus-q">¿Ha conseguido el bonus? <strong>${task.bonusLabel}</strong> (+${task.bonus} VC)</div>
      <div class="bonus-btns">
        <button class="bonus-btn yes" id="bonus-yes-${task.id}">Sí, +${task.bonus} VC</button>
        <button class="bonus-btn" id="bonus-no-${task.id}">No esta vez</button>
      </div>
    </div>` : ''}
  `;
}

function renderLog() {
  const el = document.getElementById('log-list');
  if (!state.log || !state.log.length) {
    el.innerHTML = '<div style="font-size:13px;color:#8A9BB0;padding:8px 0">Sin actividad todavía</div>';
    return;
  }
  el.innerHTML = [...state.log].reverse().slice(0,12).map(e => `
    <div class="log-entry">
      <div class="log-dot ${e.pts < 0 ? 'neg':''}"></div>
      <div class="log-text">${e.text}</div>
      <div class="log-who">${e.who} · ${e.time}</div>
      <div class="log-pts ${e.pts < 0 ? 'neg':''}">${e.pts > 0 ? '+':''}${e.pts} VC</div>
    </div>`).join('');
}

window.switchUser = function(u) {
  currentUser = u;
  localStorage.setItem('viccoins_user', u);
  document.getElementById('btn-mama').className = 'user-btn' + (u==='Mamá'?' active':'');
  document.getElementById('btn-papa').className = 'user-btn' + (u==='Papá'?' active':'');
}

window.toggleTask = function(task) {
  const wasDone = !!state.done[task.id];
  if (!wasDone) {
    state.done[task.id] = true;
    if (task.pts > 0) addLog(task.name, task.pts);
  } else {
    const hadBonus = state.bonusDone[task.id] === true;
    state.done[task.id] = false;
    delete state.bonusDone[task.id];
    const lost = task.pts + (hadBonus ? task.bonus : 0);
    if (lost > 0) addLog('Deshecho: ' + task.name, -lost);
  }
  saveDay();
  render();
}

window.grantBonus = function(taskId, pts, name) {
  state.bonusDone[taskId] = true;
  addLog('Bonus: ' + name, pts);
  saveDay();
  render();
}

window.denyBonus = function(taskId) {
  state.bonusDone[taskId] = 'denied';
  saveDay();
  render();
}

window.saveGoal = function() {
  const name = document.getElementById('goal-name').value.trim();
  const vc = parseInt(document.getElementById('goal-vc').value);
  if (name && vc > 0) {
    state.goal = {name, vc};
    saveConfig();
    render();
  }
}

window.resetDay = function() {
  if (!confirm('¿Cerrar el día de hoy? Los puntos se añaden a la hucha.')) return;
  state.huchaTotal = Math.round(state.huchaTotal + calcTotal());
  state.done = {};
  state.bonusDone = {};
  state.log = [];
  saveDay();
  saveConfig();
  render();
}

window.showStats = function() {
  alert('Hucha total: ' + Math.round(state.huchaTotal + calcTotal()) + ' Vic Coins\n= ' + ((state.huchaTotal + calcTotal())/200).toFixed(2) + '€\n\nObjetivo: ' + (state.goal.name || '—') + '\nNecesitas: ' + (state.goal.vc || '—') + ' VC');
}

function addLog(text, pts) {
  if (!state.log) state.log = [];
  const now = new Date();
  state.log.push({
    text, pts,
    who: currentUser,
    time: now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})
  });
}

const today = new Date();
document.getElementById('topbar-date').textContent = today.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
document.getElementById('btn-mama').className = 'user-btn' + (currentUser==='Mamá'?' active':'');
document.getElementById('btn-papa').className = 'user-btn' + (currentUser==='Papá'?' active':'');

async function init() {
  try {
    const configSnap = await getDoc(configRef);
    if (configSnap.exists()) {
      const d = configSnap.data();
      state.huchaTotal = d.huchaTotal || 0;
      state.goal = d.goal || {name:'', vc:0};
    }
  } catch(e) {}

  onSnapshot(dayRef, (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      state.done = d.done || {};
      state.bonusDone = d.bonusDone || {};
      state.log = d.log || [];
    } else {
      state.done = {};
      state.bonusDone = {};
      state.log = [];
    }
    setSync(true);
    render();
  }, () => {
    setSync(false);
    render();
  });
}

init();
</script>
</body>
</html>
